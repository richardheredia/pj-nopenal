<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentación de Demanda</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body{
      background:#f3f3f3;
      font-family: "Segoe UI", Arial, sans-serif;
      margin:0;
      overflow-x:hidden;
    }

    /* Topbar */
    .topbar{
      background:#6c0000;
      color:#fff;
      height:48px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 14px;
      font-size:14px;
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:18px;
    }

    .brand{
      font-size:20px;
      font-weight:700;
      padding-right:18px;
      border-right:1px solid rgba(255,255,255,.18);
    }

    .crumbs{
      display:flex;
      align-items:center;
      gap:10px;
      white-space:nowrap;
    }

    .crumbs span{
      color:#fff;
      opacity:.95;
    }

    .crumb-sep{
      opacity:.7;
      font-size:13px;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:14px;
    }

    .avatar{
      width:30px;
      height:30px;
      border-radius:50%;
      background:#c61d12;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
    }

    /* Main layout */
    .main-wrapper{
      padding:10px 10px 70px 10px;
    }

    .content-box{
      min-height:calc(100vh - 120px);
    }

    /* Left upload panel */
    .upload-panel{
      background:#edf2f7;
      border:1px solid #8eb1dc;
      min-height:560px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      color:#b8b8b8;
      text-align:center;
    }

    .upload-icon{
      font-size:72px;
      line-height:1;
      color:#c7c7c7;
      margin-bottom:8px;
    }

    .upload-text{
      font-size:16px;
      margin-bottom:10px;
      color:#b7b7b7;
    }

    .btn-select-files{
      background:#f0ad4e;
      color:#111;
      border:none;
      border-radius:0;
      padding:8px 16px;
      font-size:15px;
    }

    .instant-upload{
      position:absolute;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      background:#0d82dd;
      color:#fff;
      padding:12px 34px;
      font-size:14px;
      white-space:nowrap;
      box-shadow:0 2px 6px rgba(0,0,0,.15);
    }

    /* Right panel */
    .form-side{
      background:#efefef;
      min-height:560px;
      padding:0;
      border-left:1px solid #ddd;
    }

    .section-header-simple{
      padding:12px 14px;
      font-size:15px;
      color:#666;
      background:#ececec;
      border-bottom:1px solid #ddd;
    }

    .card-lite{
      background:#f7f7f7;
      border:1px solid #e2e2e2;
      margin:0 12px 10px 12px;
    }

    .card-lite .title{
      font-size:12px;
      color:#9d9d9d;
      padding:10px 12px;
      border-bottom:1px solid #e5e5e5;
      text-transform:uppercase;
      background:#f0f0f0;
    }

    .card-lite .body{
      padding:14px 14px 12px 14px;
      background:#f7f7f7;
    }

    .field-label{
      font-size:14px;
      color:#555;
      margin-bottom:4px;
    }

    .required::after{
      content:" *";
      color:#d9534f;
    }

    .form-control,
    .form-select{
      border-radius:0;
      min-height:34px;
      font-size:14px;
      background:#fafafa;
    }

    .compact-input{
      height:34px;
      padding-top:4px;
      padding-bottom:4px;
    }

    .search-addon{
      width:34px;
      border:1px solid #ced4da;
      background:#e9e9e9;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#8b8b8b;
    }

    .edit-icon{
      color:#2d8cff;
      font-size:16px;
      float:right;
    }

    .cancel-area{
      text-align:right;
      padding-top:16px;
      color:#555;
      font-size:15px;
    }

    .cancel-area a{
      color:#555;
      text-decoration:none;
      margin-left:14px;
    }

    /* Bottom bar */
    .bottom-bar{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      height:50px;
      background:#4b4642;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:34px;
      padding:0 16px;
      z-index:1000;
    }

    .bottom-link{
      color:#fff;
      text-decoration:none;
      font-size:15px;
    }

    .btn-submit-main{
      background:#f0b35a;
      color:#4b2a00;
      border:none;
      padding:8px 16px;
      font-size:15px;
      line-height:1.1;
    }

    @media (max-width: 991.98px){
      .content-box{
        min-height:auto;
      }

      .upload-panel,
      .form-side{
        min-height:auto;
      }

      .instant-upload{
        position:static;
        transform:none;
        margin-top:18px;
      }

      .bottom-bar{
        gap:14px;
        flex-wrap:wrap;
        height:auto;
        padding:10px;
      }
    }
  </style>
</head>
<body>

  <!-- Barra superior -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="brand">eSAJ</div>
      <div class="crumbs">
        <span>Portal de Servicios</span>
        <span class="crumb-sep">&gt;</span>
        <span>Presentaciones</span>
        <span class="crumb-sep">&gt;</span>
        <span>Demanda</span>
      </div>
    </div>

    <div class="topbar-right">
      <span>Colunga Olivares, Fernando</span>
      <div class="avatar">C</div>
    </div>
  </div>

  <!-- Contenido -->
  <div class="main-wrapper container-fluid">
    <div class="row g-0 content-box">
      
      <!-- Izquierda -->
      <div class="col-lg-7 pe-lg-3 mb-3 mb-lg-0">
        <div class="upload-panel">
          <div class="upload-icon">
            <i class="bi bi-arrow-up"></i>
          </div>
          <div class="upload-text">Arrastre y suelte los archivos aquí o</div>
          <button class="btn-select-files">Selecciona archivos</button>

          <div class="instant-upload">
            <i class="bi bi-arrow-up"></i>
            Suelta archivos y carga instantánea
          </div>
        </div>
      </div>

      <!-- Derecha -->
      <div class="col-lg-5">
        <div class="form-side">

          <div class="section-header-simple">
            Juzgado especializado <i class="bi bi-chevron-down small"></i>
          </div>

          <!-- Peticionante -->
          <div class="card-lite mt-2">
            <div class="title">Peticionante</div>
            <div class="body">
              <select class="form-select compact-input">
                <option selected>Colunga Olivares, Fernando (Colunga Olivares, Fernando - Abogado)</option>
              </select>
            </div>
          </div>

          <!-- Datos del proceso -->
          <div class="card-lite">
            <div class="title">
              Datos del proceso
              <i class="bi bi-pencil edit-icon"></i>
            </div>
            <div class="body">
              <div class="row">
                <div class="col-md-7 mb-3">
                  <label class="field-label required">Distrito Judicial</label>
                  <select class="form-select compact-input">
                    <option selected>Introduce el nombre a buscar y selecciona...</option>
                    <option>Lima</option>
                    <option>San Martín</option>
                    <option>Loreto</option>
                  </select>
                </div>

                <div class="col-md-5 mb-3">
                  <label class="field-label">Valor de la cuantía</label>
                  <input type="text" class="form-control compact-input" placeholder="S/ 0,00">
                </div>

                <div class="col-md-7 mb-3">
                  <label class="field-label required">Especialidad</label>
                  <select class="form-select compact-input">
                    <option selected>Introduce el nombre a buscar y selecciona...</option>
                    <option>Laboral</option>
                    <option>Civil</option>
                    <option>Familia</option>
                  </select>
                </div>

                <div class="col-md-5 mb-3"></div>

                <div class="col-md-7 mb-3">
                  <label class="field-label required">Instancia Judicial</label>
                  <select class="form-select compact-input">
                    <option selected>Introduce el nombre a buscar y selecciona...</option>
                    <option>Juzgado especializado</option>
                    <option>Sala superior</option>
                  </select>
                </div>

                <div class="col-md-5 mb-3"></div>

                <div class="col-md-7 mb-3">
                  <label class="field-label required">Vía Procedimental</label>
                  <div class="d-flex">
                    <select class="form-select compact-input">
                      <option selected>Introduce el nombre a buscar y selecciona...</option>
                      <option>Proceso abreviado</option>
                      <option>Proceso ordinario</option>
                    </select>
                    <div class="search-addon">
                      <i class="bi bi-search"></i>
                    </div>
                  </div>
                </div>

                <div class="col-md-5 mb-3"></div>

                <div class="col-md-7 mb-2">
                  <label class="field-label required">Materia</label>
                  <div class="d-flex">
                    <select class="form-select compact-input">
                      <option selected>Introduce el nombre a buscar y selecciona...</option>
                      <option>Beneficios sociales</option>
                      <option>Despido arbitrario</option>
                    </select>
                    <div class="search-addon">
                      <i class="bi bi-search"></i>
                    </div>
                  </div>
                </div>

                <div class="col-md-5"></div>
              </div>

              <div class="cancel-area">
                <a href="#"><i class="bi bi-x-lg"></i> Cancelar</a>
                <a href="#"><i class="bi bi-chevron-up"></i></a>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- Barra inferior -->
  <div class="bottom-bar">
    <a href="#" class="bottom-link">Regresar</a>
    <a href="#" class="bottom-link">Guardar para continuar después</a>
    <a href="#" class="bottom-link">Guardar para interponer después</a>
    <button class="btn-submit-main">Interponer</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
